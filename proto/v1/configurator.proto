syntax = "proto3";

package beget.k8s.v1.configurator;

import "google/api/annotations.proto";
import "k8s/proto/v1/structures.proto";

// Конфигуратор k8s
//
// Предоставляет набор методов для получения данных для создания кластеров и других сущностей k8s
service ConfiguratorService {
    // Получить список регионов
    //
    // Получение списка регионов для создания кластера k8s
    rpc getRegionList (GetRegionListRequest) returns (GetRegionListResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/region-list",
        };
    }

    // Получить список версий
    //
    // Получение списка версий k8s
    rpc getVersions (GetVersionsRequest) returns (GetVersionsResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/versions",
        };
    }

    // Получить месячную/дневную стоимость конфигураций
    rpc getConfigurationPrices (GetConfigurationPriceRequest) returns (GetConfigurationPriceResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/configuration-prices",
        };
    }

    // Получить список конфигураций
    //
    // Получение списка конфигураций для создания кластера
    rpc getConfigurationList (GetConfigurationListRequest) returns (GetConfigurationListResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/configuration-list",
        };
    }

    // Получить настройки конфигурации
    //
    // Возвращает настройки конфигурации (CPU, RAM итд)
    rpc getWorkerGroupConfiguration (GetWorkerGroupConfigurationRequest) returns (GetWorkerGroupConfigurationResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/worker-group-configuration",
        };
    }

    // Получить расчет конфигурации
    //
    // Проверяет возможность создания переданной конфигурации, возвращает ее стоимость.
    rpc getCalculation (GetCalculationRequest) returns (GetCalculationResponse) {
        option (google.api.http) = {
            get: "/v1/k8s/configurator/calculation"
        };
    }
}

message GetConfigurationListRequest {
}

message GetConfigurationListResponse {
    repeated structures.ClusterConfigurationInfo configuration_info = 1;
}

message GetWorkerGroupConfigurationRequest {
    // Регион, для которого получить информацию о конфигурации. По-умолчанию: ru1
    string region = 1;
}

message GetWorkerGroupConfigurationResponse {
    // Настройки конфигурации
    ConfiguratorSettings settings = 1 [deprecated = true];

    // Результат запроса
    oneof result {
        // Результат запроса: Настройки конфигурации
        ConfiguratorSettings configurator_settings = 2;

        // Результат запроса: Ошибка
        Error error = 3;
    }

    message Error {
        // Код ошибки
        Code code = 1;

        // Описание ошибки
        string message = 2;

        enum Code {
            // Внутренняя ошибка
            INTERNAL_ERROR = 0;

            // Сервис временно недоступен
            TEMPORARILY_UNAVAILABLE = 1;

            // Сервис недоступен в данном регионе
            UNAVAILABLE_FOR_REGION = 2;
        }
    }

    message ConfiguratorSettings {
        // Настройки CPU
        CpuSettings cpu_settings = 1;

        // Настройки диска
        NVMeSettings nvme_settings = 2;

        // Настройки памяти
        MemorySettings memory_settings = 3;

        message CpuSettings {
            // Диапазон значений кол-ва CPU min/max в шт
            Range range = 1;

            // Диапазон доступных значений кол-ва CPU min/max в шт
            Range available_range = 2;

            // Шаг в шт
            uint32 step = 3;
        }

        message NVMeSettings {
            // Диапазон значений объема дисковой квоты min/max в МБ
            Range range = 1;

            // Диапазон доступных значений объема дисковой квоты min/max в МБ
            Range available_range = 2;

            // Шаг в МБ
            uint32 step = 3;
        }

        message MemorySettings {
            // Диапазон значений объема памяти min/max в МБ
            Range range = 1;

            // Диапазон доступных значений объема памяти min/max в МБ
            Range available_range = 2;

            // Шаг в МБ
            uint32 step = 3;
        }

        message Range {
            // Минимальное значение
            uint32 min = 1;
            // Максимальное значение
            uint32 max = 2;
        }
    }
}

message GetCalculationRequest {
    // Параметры конфигурации
    ConfigurationParams params = 1;

    // Регион, для которого требуется рассчитать конфигурацию. По-умолчанию: ru1
    string region = 2;

    message ConfigurationParams {
        // Количество ядер процессора
        uint32 cpu_count = 1;

        // Объем дисковой квоты в Мб
        uint32 nvme_size = 2;

        // Объем оперативной памяти в Мб
        uint32 memory = 3;
    }
}

message GetCalculationResponse {
    // Результат запроса
    oneof result {
        // Результат запроса: информация о конфигурации
        Success success = 1;

        // Результат запроса: ошибка
        Error error = 2;
    }

    message Success {
        // Стоимость полученной конфигурации в день
        double price_day = 1;

        // Стоимость полученной конфигурации в месяц
        double price_month = 2;
    }

    message Error {
        // Код ошибки
        Code code = 1;

        // Описание ошибки
        string message = 2;

        enum Code {
            // Внутренняя ошибка
            INTERNAL_ERROR = 0;
        }
    }
}

message GetRegionListRequest {
}

message GetRegionListResponse {
    repeated structures.RegionInfo region_info = 1;

    // Идентификатор региона, используемого по умолчанию
    string default_region_id = 2;
}

message GetVersionsRequest {
}

message GetVersionsResponse {
    // Дефолтная версия k8s
    string default_version = 1;

    // Все доступные версии k8s
    repeated KubernetesVersionInfo version_info = 2;

    message KubernetesVersionInfo {
        // Версия k8s
        string version = 1;

        // Ссылка на базу знаний
        string docs_url = 2;
    }
}

message GetConfigurationPriceRequest {
}

message GetConfigurationPriceResponse {
    repeated ConfigurationPriceInfo price_info = 1;

    message ConfigurationPriceInfo {
        // Название конфигурации
        string configuration_name = 1;

        // Стоимость в сутки
        double price_day = 2;

        // Стоимость в месяц
        double price_month = 3;
    }
}
